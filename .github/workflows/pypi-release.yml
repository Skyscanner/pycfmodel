name: PyPI release

on:
  release:
    types: [published]

jobs:
  build:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pycfmodel
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          enable-cache: false  # Disable cache for release builds to prevent cache poisoning

      - name: Setup python
        run: uv python install 3.10

      - name: Build package
        run: uv build

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # zizmor: ignore[use-trusted-publishing] https://github.com/pypi/warehouse/issues/17700
          user: __token__
          password: ${{ secrets.pypi_publish_token }}
